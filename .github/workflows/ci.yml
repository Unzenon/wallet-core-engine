name: CI/CD Pipeline with Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"
      - name: Run Tests
        run: go test -v ./...

  build-and-secure:
    needs: test # Job ini nunggu 'test' sukses dulu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image (Local Load)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # PENTING: Simpan image di server GitHub dulu, JANGAN di-push!
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wallet-core-engine:latest

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/wallet-core-engine:latest"
          format: "table"
          exit-code: "1" # Gagalkan pipeline kalau nemu virus/celah keamanan
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Push Docker Image to Docker Hub
        # Step ini cuma akan dieksekusi kalau step Trivy di atas lolos (aman)
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/wallet-core-engine:latest
