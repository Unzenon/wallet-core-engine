name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Tahap 1: Pastikan kode tidak ada error dengan menjalankan unit test
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.22"
      - name: Run Tests
        run: go test -v ./...

  # Tahap 2: Build Docker Image (hanya jika tahap test sukses)
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: |
          docker build -t wallet-core-engine:${{ github.sha }} .
